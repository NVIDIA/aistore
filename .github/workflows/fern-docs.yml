name: Fern Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'README.md'
      - 'fern/**'
      - 'scripts/fern/**'
  workflow_dispatch:

jobs:
  publish:
    name: Publish Fern docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install pyyaml

      - name: Install Fern
        run: npm install -g fern-api

      - name: Generate Fern pages
        run: bash scripts/fern/generate-pages.sh

      - name: Generate Python API reference (from source docstrings)
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: fern docs md generate

      - name: Validate configuration
        run: fern check

      - name: Publish to production
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
        run: fern generate --docs
