name: Deploy Website

on:
  push:
    branches: [main]
  pull_request:

jobs:
  deploy_website:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.26.x']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Install OpenAPI Generator CLI
        run: |
          mkdir -p ~/bin/openapitools
          curl -L https://raw.githubusercontent.com/OpenAPITools/openapi-generator/master/bin/utils/openapi-generator-cli.sh > ~/bin/openapitools/openapi-generator-cli
          chmod +x ~/bin/openapitools/openapi-generator-cli
          echo "$HOME/bin/openapitools" >> $GITHUB_PATH

      - name: Generate API Documentation
        run: |
          OPENAPI_GENERATOR_VERSION=7.14.0 make api-docs-website

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: 3.1.3

      - name: Build and deploy
        env:
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: |
          # ── build inside docs ───────────────────
          cd docs
          bundle install --quiet
          bundle exec jekyll build
          # ── deploy from repo root ───────────────
          cd "$GITHUB_WORKSPACE"
          npm install -g netlify-cli@23.7.3
          netlify deploy --dir=docs/_site --prod
