title: NVIDIA AIStore

global-theme: nvidia

instances:
  - url: aistore.docs.buildwithfern.com/aistore
    custom-domain: docs.nvidia.com/aistore
    multi-source: true

logo:
  href: /aistore/
  right-text: AIStore

navbar-links:
  - type: outlined
    text: Blog
    href: /aistore/blog
  - type: github
    value: https://github.com/NVIDIA/aistore

# Python (and, later, HTTP + Go) API reference is auto-generated from source
# via `fern docs md generate` in CI. Output lands under fern/pages/python/
# and is gitignored — do not commit the generated pages.
libraries:
  python:
    input:
      git: https://github.com/NVIDIA/aistore
      subpath: python/aistore
    output:
      path: ./pages/python
    lang: python

tabs:
  docs:
    display-name: Docs
    icon: fa-regular fa-book
    skip-slug: true
  api-reference:
    display-name: API Reference
    icon: fa-regular fa-code

navigation:
- tab: docs
  layout:
  # Landing page: main README
  - page: AIStore
    path: ./pages/readme.md
    slug: ""

  # Docs index: links to all documentation
  - page: Documentation
    path: ./pages/docs.md
    slug: docs

  # AUTO_GENERATED_DOCS_ENTRIES

  # AUTO_GENERATED_BLOG_ENTRIES

- tab: api-reference
  layout:
  - section: Python SDK
    slug: ""
    contents:
    - folder: ./pages/python

redirects:
  # Old blog date-based URLs → new flat blog slugs
  - source: /blog/:year/:month/:day/:slug
    destination: /blog/:slug
